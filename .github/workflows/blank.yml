name: Update Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}      # <-- PAT here (so it can read your repos)
          committer_token: ${{ secrets.METRICS_TOKEN }}  # <-- use PAT so commits count as user activity (prevents GitHub from disabling the scheduled workflow after 60 days of bot-only commits)
          user: aleksandarmilacic
          filename: github-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, js, scss
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 16
          output_action: commit
          committer_message: "chore: update metrics"
